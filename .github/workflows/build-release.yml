# ============================================================
# py2roid — 打 tag 自动构建 APK 并发布 GitHub Release
# ============================================================
# 触发方式：推送符合 v*.*.* 模式的 tag，例如：
#   git tag v1.0.0
#   git push origin v1.0.0
# ============================================================

name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches/modules-2
            ~/.gradle/caches/transforms-3
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle.kts', 'android/**/*.gradle', 'android/gradle/wrapper/gradle-wrapper.properties', 'android/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: android

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon
        working-directory: android

      - name: Locate APK
        id: locate-apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk-path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Generate Changelog
        id: changelog
        run: |
          # 获取上一个 tag
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1 || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="$PREV_TAG..HEAD"
          fi

          # 一次性获取所有 commit（带 hash + subject），再按类型分类
          ALL_COMMITS=$(git log "$RANGE" --oneline --no-decorate 2>/dev/null || true)

          if [ -z "$ALL_COMMITS" ]; then
            echo "changelog=*无提交记录*" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 用扩展正则精确匹配 conventional commit 格式（支持 scope 和 bang）
          FEATS=$(    echo "$ALL_COMMITS" | grep -E "^[a-f0-9]+\s+(feat)(\(.*\))?(!)?:" || true)
          FIXES=$(    echo "$ALL_COMMITS" | grep -E "^[a-f0-9]+\s+(fix)(\(.*\))?(!)?:" || true)
          REFACTOR=$( echo "$ALL_COMMITS" | grep -E "^[a-f0-9]+\s+(refactor)(\(.*\))?(!)?:" || true)
          DOCS=$(     echo "$ALL_COMMITS" | grep -E "^[a-f0-9]+\s+(docs)(\(.*\))?(!)?:" || true)
          PERF=$(     echo "$ALL_COMMITS" | grep -E "^[a-f0-9]+\s+(perf)(\(.*\))?(!)?:" || true)
          OTHER=$(    echo "$ALL_COMMITS" | grep -vE "^[a-f0-9]+\s+(feat|fix|refactor|docs|perf)(\(.*\))?(!)?:" || true)

          # 用 heredoc 安全输出（避免 printf % 转义问题）
          {
            echo "changelog<<EOF"
            if [ -n "$FEATS" ]; then
              echo ""
              echo "### 🚀 新功能"
              echo "$FEATS"
            fi
            if [ -n "$FIXES" ]; then
              echo ""
              echo "### 🐛 Bug 修复"
              echo "$FIXES"
            fi
            if [ -n "$REFACTOR" ]; then
              echo ""
              echo "### ♻️ 重构"
              echo "$REFACTOR"
            fi
            if [ -n "$DOCS" ]; then
              echo ""
              echo "### 📝 文档"
              echo "$DOCS"
            fi
            if [ -n "$PERF" ]; then
              echo ""
              echo "### ⚡ 性能优化"
              echo "$PERF"
            fi
            if [ -n "$OTHER" ]; then
              echo ""
              echo "### 🔧 其他"
              echo "$OTHER"
            fi
            # 如果没有任何分类匹配
            if [ -z "$FEATS$FIXES$REFACTOR$DOCS$PERF$OTHER" ]; then
              echo "*首次发布*"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: py2roid ${{ github.ref_name }}
          body: |
            ## py2roid ${{ github.ref_name }}

            ${{ steps.changelog.outputs.changelog }}

            ---

            ### 📦 下载
            - `py2roid-${{ github.ref_name }}.apk` — Release APK

            > 由 GitHub Actions 自动构建。
          files: ${{ steps.locate-apk.outputs.apk-path }}
