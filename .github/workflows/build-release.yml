# ============================================================
# py2roid — 打 tag 自动构建 APK 并发布 GitHub Release
# ============================================================
# 触发方式：推送符合 v*.*.* 模式的 tag，例如：
#   git tag v1.0.0
#   git push origin v1.0.0
# ============================================================

name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle.kts', 'android/**/*.gradle', 'android/gradle/wrapper/gradle-wrapper.properties', 'android/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk
          key: android-sdk-${{ runner.os }}-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle.properties') }}
          restore-keys: |
            android-sdk-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: android

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon
        working-directory: android

      - name: Locate APK
        id: locate-apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk-path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Generate Changelog
        id: changelog
        run: |
          # 获取上一个 tag
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1 || echo "")
          if [ -z "$PREV_TAG" ]; then
            # 第一个 release，取所有历史
            RANGE="HEAD"
          else
            RANGE="$PREV_TAG..HEAD"
          fi

          # 按 conventional commit 类型分类
          FEATS=$(git log "$RANGE" --oneline --no-decorate --grep="^feat" 2>/dev/null || true)
          FIXES=$(git log "$RANGE" --oneline --no-decorate --grep="^fix" 2>/dev/null || true)
          REFACTOR=$(git log "$RANGE" --oneline --no-decorate --grep="^refactor" 2>/dev/null || true)
          DOCS=$(git log "$RANGE" --oneline --no-decorate --grep="^docs" 2>/dev/null || true)
          PERF=$(git log "$RANGE" --oneline --no-decorate --grep="^perf" 2>/dev/null || true)
          OTHER=$(git log "$RANGE" --oneline --no-decorate 2>/dev/null | grep -v "^[a-f0-9]\{7,9\} feat" | grep -v "^[a-f0-9]\{7,9\} fix" | grep -v "^[a-f0-9]\{7,9\} refactor" | grep -v "^[a-f0-9]\{7,9\} docs" | grep -v "^[a-f0-9]\{7,9\} perf" || true)

          # 构建 Markdown 分类 changelog
          CHANGELOG=""
          append_section() {
            local title="$1" content="$2"
            if [ -n "$content" ]; then
              CHANGELOG="${CHANGELOG}\n\n### $title\n${content}"
            fi
          }
          append_section "🚀 新功能" "$FEATS"
          append_section "🐛 Bug 修复" "$FIXES"
          append_section "♻️ 重构" "$REFACTOR"
          append_section "📝 文档" "$DOCS"
          append_section "⚡ 性能优化" "$PERF"

          if [ -n "$OTHER" ]; then
            CHANGELOG="${CHANGELOG}\n\n### 🔧 其他\n${OTHER}"
          fi

          # 输出（转义换行符为 %0A 供 GITHUB_OUTPUT 使用）
          CHANGELOG="${CHANGELOG:-*首次发布*}"
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          printf "%b" "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: py2roid ${{ github.ref_name }}
          body: |
            ## py2roid ${{ github.ref_name }}

            ${{ steps.changelog.outputs.changelog }}

            ---

            ### 📦 下载
            - `py2roid-${{ github.ref_name }}.apk` — Release APK

            > 由 GitHub Actions 自动构建。
          files: ${{ steps.locate-apk.outputs.apk-path }}
          generate_release_notes: true
